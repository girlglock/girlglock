<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | GIRLGLOCK</title>

  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/ekmas/cs16.css@main/css/cs16.min.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url("https://femboy.beauty/JJ3mBb.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .cs-dialog {
      position: relative;
      width: min(90vw, 480px);
    }

    .heading {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 6px;
    }

    .panel {
      padding: 18px 16px !important;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .error-code {
      font-size: 48px;
      font-weight: bold;
      color: var(--accent);
      line-height: 1;
      letter-spacing: 2px;
    }

    .error-msg {
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
    }

    .error-msg span {
      color: var(--accent);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-top: 4px;
    }

    .links .cs-btn {
      width: 100%;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="cs-dialog">
    <div class="heading">
      <div class="wrapper">
        <div class="icon"></div>
        <p class="text">error</p>
      </div>
      <button class="cs-btn close"></button>
    </div>
    <div class="panel" style="align-items: center;">
      <div class="error-code">404</div>
      <div class="error-msg" style="text-align: center;">
        fool <br>
        <img src="https://cdn.7tv.app/emote/01GH81P2B00004YQKQDS2ZD2AK/4x.webp" />
      </div>
    </div>
  </div>
</body>

</html>
