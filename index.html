<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GIRLGLOCK ૮ ˶ᵔ ᵕ ᵔ˶ ა">

  <meta property="og:url" content="https://girlglock.com">
  <meta property="og:type" content="website">
  <meta property="og:title" content="GIRLGLOCK">
  <meta property="og:description" content="GIRLGLOCK ૮ ˶ᵔ ᵕ ᵔ˶ ა">

  <meta name="twitter:card" content="summary_large_image">
  <meta property="twitter:domain" content="girlglock.com">
  <meta property="twitter:url" content="https://girlglock.com">
  <meta name="twitter:title" content="GIRLGLOCK">
  <meta name="twitter:description" content="GIRLGLOCK ૮ ˶ᵔ ᵕ ᵔ˶ ა">
  <meta name="twitter:image" content="https://cdn.7tv.app/emote/01H9D5QNVR0005XNK7Z4N9D90F/4x.gif">
  <title>GIRLGLOCK</title>

  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/ekmas/cs16.css@main/css/cs16.min.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url("https://femboy.beauty/JJ3mBb.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .cs-dialog {
      position: relative;
      width: min(90vw, 800px);
      min-height: 120px;
      display: grid;
      grid-template-rows: 28px 1fr;
      grid-template-columns: 1fr;
    }

    .heading {
      grid-row: 1;
      grid-column: 1;

      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 6px;
    }

    #main {
      grid-row: 2;
      grid-column: 1;
      display: grid;
      grid-template-rows: 1fr;
      grid-template-columns: 1fr;
      overflow: hidden;
    }

    #progress-bar {
      grid-area: 1 / 1;
      align-self: center;
      justify-self: center;
      width: 50%;
    }

    #header {
      grid-area: 1 / 1;
      display: none;
      overflow: hidden;
    }

    #header.visible {
      display: block;
    }

    .cs-tabs {
      overflow: hidden;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .panel {
      overflow-y: auto;
      padding: 10px 12px !important;
      max-height: calc(min(90vh, 450px) - 28px - 30px);
    }

    .panel h1 {
      display: none;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 6px;
      padding: 4px 0;
    }

    .links .cs-btn {
      width: 100%;
      text-align: center;
    }

    /* ── Lanyard Status Widget ── */
    #lanyard-status {
      margin-top: 10px;
      border: 1px solid;
      border-color: var(--border-dark) var(--border-light) var(--border-light) var(--border-dark);
      background-color: var(--secondary-bg);
      padding: 6px 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 14px;
      color: var(--text);
    }

    .lanyard-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lanyard-avatar-wrap {
      position: relative;
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .lanyard-avatar {
      width: 36px;
      height: 36px;
      image-rendering: pixelated;
      display: block;
    }

    .status-dot {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 10px;
      height: 10px;
      border: 2px solid var(--secondary-bg);
      border-radius: 50%;
      background-color: #747f8d;
      /* offline default */
    }

    .status-dot.online {
      background-color: #43b581;
    }

    .status-dot.idle {
      background-color: #faa61a;
    }

    .status-dot.dnd {
      background-color: #f04747;
    }

    .status-dot.offline {
      background-color: #747f8d;
    }

    .lanyard-userinfo {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
    }

    .lanyard-name {
      color: #fff;
      font-size: 15px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lanyard-tag {
      color: var(--text-3);
      font-size: 12px;
    }

    .lanyard-activity {
      display: none;
      align-items: center;
      gap: 7px;
      padding-top: 4px;
      border-top: 1px solid var(--border-dark);
    }

    .lanyard-activity.visible {
      display: flex;
    }

    .lanyard-activity-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      image-rendering: pixelated;
    }

    .lanyard-activity-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
      font-size: 12px;
      line-height: 1.3;
    }

    .lanyard-activity-name {
      color: var(--accent);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lanyard-activity-detail,
    .lanyard-activity-state {
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lanyard-spotify {
      display: none;
      align-items: center;
      gap: 7px;
      padding-top: 4px;
      border-top: 1px solid var(--border-dark);
    }

    .lanyard-spotify.visible {
      display: flex;
    }

    .lanyard-spotify-art {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .lanyard-spotify-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
      font-size: 12px;
      line-height: 1.3;
    }

    .lanyard-spotify-song {
      color: #1db954;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lanyard-spotify-artist {
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lanyard-ws-indicator {
      font-size: 11px;
      color: var(--text-3);
      text-align: right;
    }

    .lanyard-ws-indicator.connected {
      color: #43b581;
    }

    .lanyard-ws-indicator.error {
      color: #f04747;
    }
  </style>
</head>

<body>
  <div class="cs-dialog">
    <div class="heading">
      <div class="wrapper">
        <div class="icon"></div>
        <p class="text">GIRLGLOCK</p>
      </div>
      <button class="cs-btn close"></button>
    </div>
    <div id="main">

      <div class="cs-progress-bar" id="progress-bar">
        <div style="width: 0%" class="bars"></div>
      </div>

      <header id="header">
        <div class="cs-tabs">
          <input class="radiotab" name="tabs" tabindex="1" type="radio" id="tabone" checked="checked" />
          <label class="label" for="tabone">Socials</label>
          <div class="panel" tabindex="1">
            <h1>Socials</h1>
            <div class="links">
              <a href="https://bsky.app/profile/girlglock.com" class="cs-btn">BlueSky</a>
              <a href="https://x.com/girlglock_" target="_blank" class="cs-btn">Twitter</a>
              <a href="https://github.com/girlglock" target="_blank" class="cs-btn">Github</a>
              <a href="https://www.youtube.com/@girlglockk" target="_blank" class="cs-btn">YouTube</a>
              <a href="https://steamcommunity.com/id/point_script/" target="_blank" class="cs-btn">Steam</a>
            </div>

            <div id="lanyard-status">
              <div class="lanyard-header">
                <div class="lanyard-avatar-wrap">
                  <img id="ld-avatar" class="lanyard-avatar" src="" alt="avatar" />
                  <div id="ld-dot" class="status-dot offline"></div>
                </div>
                <div class="lanyard-userinfo">
                  <span id="ld-name" class="lanyard-name">dea</span>
                  <span id="ld-tag" class="lanyard-tag">girlglock</span>
                </div>
                <div style="flex:1"></div>
                <span id="ld-ws" class="lanyard-ws-indicator">connecting...</span>
              </div>

              <div id="ld-activity" class="lanyard-activity">
                <img id="ld-act-icon" class="lanyard-activity-icon" src="" alt="" />
                <div class="lanyard-activity-text">
                  <span id="ld-act-name" class="lanyard-activity-name"></span>
                  <span id="ld-act-detail" class="lanyard-activity-detail"></span>
                  <span id="ld-act-state" class="lanyard-activity-state"></span>
                </div>
              </div>

              <div id="ld-spotify" class="lanyard-spotify">
                <img id="ld-sp-art" class="lanyard-spotify-art" src="" alt="album art" />
                <div class="lanyard-spotify-text">
                  <span id="ld-sp-song" class="lanyard-spotify-song"></span>
                  <span id="ld-sp-artist" class="lanyard-spotify-artist"></span>
                </div>
              </div>
            </div>
          </div>

          <input class="radiotab" tabindex="1" name="tabs" type="radio" id="tabtwo" />
          <label class="label" for="tabtwo">Tools</label>
          <div class="panel" tabindex="1">
            <h1>Tools</h1>
            <div class="links">
              <a href="https://girlglock.com/input-overlay/" target="_blank" class="cs-btn">OBS Input Overlay</a>
              <a href="https://girlglock.com/emote-sounds/" target="_blank" class="cs-btn">OBS Emote Combo Sounds</a>
              <a href="https://girlglock.com/speaking-cat/" target="_blank" class="cs-btn">OBS PNG-Tuber Tool</a>
              <a href="https://girlglock.com/ps2/" target="_blank" class="cs-btn">PS2 Wallpaper</a>
              <a href="https://girlglock.com/voicefreq/" target="_blank" class="cs-btn">Voice Frequency range
                monitor</a>
            </div>
          </div>

        </div>
      </header>

    </div>
  </div>

  <script>
    window.onload = function () {
      const bar = document.querySelector(".cs-progress-bar .bars");
      const pbWrap = document.getElementById("progress-bar");
      const header = document.getElementById("header");

      let width = 0;
      const step = 10, interval = 50;

      const id = setInterval(() => {
        width += step;
        bar.style.width = width + "%";

        if (width >= 100) {
          clearInterval(id);
          setTimeout(() => {
            pbWrap.style.display = "none";
            header.classList.add("visible");
          }, 200);
        }
      }, interval);
    };

    const LANYARD_USER_ID = "1167069721162686528";
    const LANYARD_WS = "wss://api.lanyard.rest/socket";
    const CDN = "https://cdn.discordapp.com";

    const $ = id => document.getElementById(id);

    let ws, heartbeatInterval;

    function avatarUrl(userId, hash) {
      if (!hash) return `${CDN}/embed/avatars/0.png`;
      const ext = hash.startsWith("a_") ? "gif" : "png";
      return `${CDN}/avatars/${userId}/${hash}.${ext}?size=64`;
    }

    function resolveAsset(assetKey, appId) {
      if (!assetKey) return null;
      if (assetKey.startsWith("mp:external/")) {
        const encoded = assetKey.replace("mp:external/", "");
        return `https://media.discordapp.net/external/${encoded}`;
      }
      if (assetKey.startsWith("spotify:")) {
        const id = assetKey.replace("spotify:", "");
        return `https://i.scdn.co/image/${id}`;
      }
      return `${CDN}/app-assets/${appId}/${assetKey}.png`;
    }

    function updateStatus(data) {
      const user = data.discord_user;
      const status = data.discord_status;
      $("ld-avatar").src = avatarUrl(user.id, user.avatar);
      $("ld-name").textContent = user.display_name || user.global_name || user.username;
      $("ld-tag").textContent = user.username;

      const dot = $("ld-dot");
      dot.className = `status-dot ${status}`;

      const activity = (data.activities || []).find(a => a.type === 0 || a.type === 2 && !data.listening_to_spotify);
      const actEl = $("ld-activity");

      if (activity && activity.type === 0) {
        const iconSrc = resolveAsset(activity.assets?.small_image || activity.assets?.large_image, activity.application_id);
        $("ld-act-icon").src = iconSrc || "";
        $("ld-act-icon").style.display = iconSrc ? "block" : "none";
        $("ld-act-name").textContent = activity.name || "";
        $("ld-act-detail").textContent = activity.details || "";
        $("ld-act-state").textContent = activity.state || "";
        actEl.classList.add("visible");
      } else {
        actEl.classList.remove("visible");
      }

      const spEl = $("ld-spotify");
      if (data.listening_to_spotify && data.spotify) {
        const sp = data.spotify;
        $("ld-sp-art").src = sp.album_art_url || "";
        $("ld-sp-song").textContent = sp.song || "";
        $("ld-sp-artist").textContent = sp.artist ? `by ${sp.artist}` : "";
        spEl.classList.add("visible");
      } else {
        spEl.classList.remove("visible");
      }
    }

    function connectLanyard() {
      ws = new WebSocket(LANYARD_WS);
      const wsLabel = $("ld-ws");

      ws.addEventListener("open", () => {
        wsLabel.textContent = "live";
        wsLabel.className = "lanyard-ws-indicator connected";
      });

      ws.addEventListener("message", e => {
        const msg = JSON.parse(e.data);

        if (msg.op === 1) {
          const heartbeatMs = msg.d.heartbeat_interval;
          heartbeatInterval = setInterval(() => {
            if (ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({ op: 3 }));
            }
          }, heartbeatMs);
          ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: LANYARD_USER_ID } }));
        }

        if (msg.op === 0) {
          const payload = msg.t === "INIT_STATE" ? msg.d : msg.d;
          if (payload) updateStatus(payload);
        }
      });

      ws.addEventListener("close", e => {
        console.warn("[lanyard] websocket closed, code:", e.code, "reason:", e.reason, "- reconnecting in 3s");
        wsLabel.textContent = "reconnecting...";
        wsLabel.className = "lanyard-ws-indicator error";
        clearInterval(heartbeatInterval);
        setTimeout(connectLanyard, 3000);
      });

      ws.addEventListener("error", e => {
        console.error("[lanyard] websocket error", e);
        wsLabel.textContent = "error";
        wsLabel.className = "lanyard-ws-indicator error";
        ws.close();
      });
    }

    connectLanyard();
  </script>
</body>

</html>
